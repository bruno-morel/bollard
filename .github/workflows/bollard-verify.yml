name: Bollard Verify

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install pnpm
        uses: pnpm/action-setup@v4.1.0
        # Version from package.json packageManager (pnpm@10.33.0 — not pnpm 11)

      - name: Set up Node.js (for native typecheck + lint)
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build dev image
        run: docker compose build dev

      - name: Bollard verify (skipping typecheck + lint already run above)
        run: |
          docker compose run --rm dev sh -c \
            'pnpm --filter @bollard/cli run start -- verify --quiet --ci-passed typecheck,lint'

      - name: Bollard audit-docs
        run: |
          docker compose run --rm dev sh -c \
            'pnpm --filter @bollard/cli run start -- audit-docs'

      - name: Upload verify result
        uses: actions/upload-artifact@v4.6.1
        if: failure()
        with:
          name: bollard-verify-${{ github.run_id }}
          path: .bollard/runs/history.jsonl
          if-no-files-found: ignore
