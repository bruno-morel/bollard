name: Feature request
description: Propose a capability or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today, or what costs more than it should (time, tokens, trust)?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: How you'd solve it. Note which package(s) it touches if you know.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: I checked `spec/ROADMAP.md` and this is not on the **DO NOT build yet** list (or I'm explicitly proposing to re-sequence it)
          required: true
        - label: If this adds an LLM call — I checked ADR-0004 and it genuinely can't be deterministic or local
