# Example Bollard configuration — adversarial scopes (Stage 3a+)
# Copy sections into your project `.bollard.yml` as needed.

# Root `adversarial` merges with auto-detected toolchain. Legacy
# `toolchain.adversarial.{mode,runtime_image,persist}` still maps onto
# `boundary` when this block is absent.

adversarial:
  # Optional: default concern weights for any scope (scope-specific entries override these)
  concerns:
    correctness: high
    security: medium
    performance: low
    resilience: low

  boundary:
    enabled: true
    integration: integrated # integrated | independent
    lifecycle: persistent # ephemeral | persistent — where boundary adversarial tests land
    mode: in-language # blackbox | in-language | both
    # runtime_image: custom-verify:latest  # optional Docker image for blackbox isolation
    # concerns: { correctness: high, security: high, performance: off, resilience: off }

  contract:
    enabled: true
    integration: integrated
    lifecycle: persistent # ephemeral: under .bollard/runs/<runId>/adversarial/contract/
    # framework_capable is auto-set from language (TS/Python/Go/Rust true in Stage 3a)

  behavioral:
    enabled: false # Stage 4
    integration: independent
    lifecycle: ephemeral

# Mutation testing — opt-in per-language (Stryker for JS/TS, mutmut for Python, etc.)
mutation:
  enabled: true
  tool: stryker
  threshold: 60
  timeoutMs: 300000
  concurrency: 2

# Stage 6: Lifecycle Ownership (Takeover Mode) — all domains default to disabled.
# Each domain is independently opt-in. Trust levels: review | auto-commit | silent.
# Ownership state tracked in .bollard/ownership.json (TestOwnershipManifest).
#
# takeover:
#   # Test curation: Bollard promotes adversarial tests to main suite, prunes redundant tests.
#   # New blueprint: `bollard curate tests`
#   tests:
#     enabled: false
#     trust: review            # review: human gate; auto-commit: opens PR; silent: writes directly
#     minMutationScoreToTrigger: 0  # 0 = curate every cycle regardless of score
#     maxFilesPerCycle: 5      # cap on files promoted/pruned/rewritten per run
#
#   # CI/CD ownership: Bollard generates and keeps CI workflows in sync with .bollard.yml config.
#   # New blueprint: `bollard curate ci`
#   ci:
#     enabled: false
#     trust: review
#     platforms: [github-actions]  # github-actions | gitlab-ci | circleci | buildkite
#
#   # Dependency hygiene: Bollard audits and auto-updates deps, opening PRs for security patches.
#   # New blueprint: `bollard curate deps`
#   deps:
#     enabled: false
#     trust: review
#     securityOnly: true       # true = CVE patches only; false = also major/minor bumps
#
#   # Documentation: Bollard updates docstrings/READMEs when public API signatures change.
#   # New blueprint: `bollard curate docs`
#   docs:
#     enabled: false
#     trust: review
#
#   # Monitoring: Bollard continuously manages .bollard/probes/ as behavioral context evolves.
#   # New blueprint: `bollard curate monitoring`
#   monitoring:
#     enabled: false
#     trust: review
